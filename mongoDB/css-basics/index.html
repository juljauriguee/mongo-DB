<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Basics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h1>My Website</h1>
    </header>

    <main class="main">
        <div class="container">
            <h2>Box Model Sample</h2>
            <p>This is inside a styled container.</p>
        </div>

        <div class="flex-container">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
        </div>

        <form class="form">
            <label>Name:</label>
            <input type="text" placeholder="Enter name">

            <label>Email:</label>
            <input type="email" placeholder="Enter email">

            <button type="submit">Submit</button>
        </form>
    </main>

    <footer class="footer">
        <p>CSS Basics</p>
    </footer>

</body>
</html>
